<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свободные даты для бронирования</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #c62828;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .table-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .table-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #4facfe;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .table-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .table-capacity {
            background: #4facfe;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .dates-container {
            margin-top: 15px;
        }

        .date-group {
            margin-bottom: 15px;
        }

        .date-group h4 {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
        }

        .date-item {
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .date-item.free {
            background: #e8f5e8;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .date-item.free:hover {
            background: #c8e6c9;
            transform: scale(1.05);
        }

        .date-item.booked {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .tables-grid {
                grid-template-columns: 1fr;
            }
            
            .dates-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Свободные даты для бронирования</h1>
            <p>Выберите удобную дату и время для вашего столика</p>
        </div>

        <div class="content">
            <button class="refresh-btn" onclick="loadFreeDates()">
                🔄 Обновить данные
            </button>

            <div class="stats" id="stats" style="display: none;">
                <div class="stat-card">
                    <div class="stat-number" id="total-tables">0</div>
                    <div class="stat-label">Всего столов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-free-dates">0</div>
                    <div class="stat-label">Свободных дат</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="date-range">30</div>
                    <div class="stat-label">Дней вперед</div>
                </div>
            </div>

            <div id="loading" class="loading">
                <p>Загружаем данные о свободных датах...</p>
            </div>

            <div id="error" class="error" style="display: none;">
                <p>Произошла ошибка при загрузке данных. Попробуйте обновить страницу.</p>
            </div>

            <div id="tables-container" class="tables-grid" style="display: none;"></div>
        </div>
    </div>

    <script>
        // Функция для загрузки свободных дат
        async function loadFreeDates() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tablesContainer = document.getElementById('tables-container');
            const stats = document.getElementById('stats');

            loading.style.display = 'block';
            error.style.display = 'none';
            tablesContainer.style.display = 'none';
            stats.style.display = 'none';

            try {
                const response = await fetch('/api/tables/all-free-dates/');
                if (!response.ok) {
                    throw new Error('Ошибка сети');
                }

                const data = await response.json();
                displayTables(data);
                displayStats(data);
                
                loading.style.display = 'none';
                tablesContainer.style.display = 'grid';
                stats.style.display = 'grid';

            } catch (err) {
                console.error('Ошибка:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        // Функция для отображения статистики
        function displayStats(data) {
            const totalTables = Object.keys(data.tables).length;
            let totalFreeDates = 0;
            
            Object.values(data.tables).forEach(table => {
                totalFreeDates += table.free_dates.length;
            });

            document.getElementById('total-tables').textContent = totalTables;
            document.getElementById('total-free-dates').textContent = totalFreeDates;
            document.getElementById('date-range').textContent = '30';
        }

        // Функция для отображения столов
        function displayTables(data) {
            const container = document.getElementById('tables-container');
            container.innerHTML = '';

            Object.entries(data.tables).forEach(([tableNumber, tableData]) => {
                const tableCard = createTableCard(tableNumber, tableData);
                container.appendChild(tableCard);
            });
        }

        // Функция для создания карточки стола
        function createTableCard(tableNumber, tableData) {
            const card = document.createElement('div');
            card.className = 'table-card';

            const header = document.createElement('div');
            header.className = 'table-header';

            const tableNumberDiv = document.createElement('div');
            tableNumberDiv.className = 'table-number';
            tableNumberDiv.textContent = `Стол ${tableNumber}`;

            const capacityDiv = document.createElement('div');
            capacityDiv.className = 'table-capacity';
            capacityDiv.textContent = `${tableData.capacity} мест`;

            header.appendChild(tableNumberDiv);
            header.appendChild(capacityDiv);

            const datesContainer = document.createElement('div');
            datesContainer.className = 'dates-container';

            // Свободные даты
            if (tableData.free_dates.length > 0) {
                const freeGroup = createDateGroup('Свободные даты', tableData.free_dates, 'free');
                datesContainer.appendChild(freeGroup);
            }

            // Забронированные даты
            if (tableData.booked_dates.length > 0) {
                const bookedGroup = createDateGroup('Забронировано', tableData.booked_dates, 'booked');
                datesContainer.appendChild(bookedGroup);
            }

            card.appendChild(header);
            card.appendChild(datesContainer);

            return card;
        }

        // Функция для создания группы дат
        function createDateGroup(title, dates, className) {
            const group = document.createElement('div');
            group.className = 'date-group';

            const titleH4 = document.createElement('h4');
            titleH4.textContent = title;

            const datesGrid = document.createElement('div');
            datesGrid.className = 'dates-grid';

            dates.forEach(dateStr => {
                const dateItem = document.createElement('div');
                dateItem.className = `date-item ${className}`;
                dateItem.textContent = formatDate(dateStr);
                dateItem.title = formatDate(dateStr);
                datesGrid.appendChild(dateItem);
            });

            group.appendChild(titleH4);
            group.appendChild(datesGrid);

            return group;
        }

        // Функция для форматирования даты
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const day = date.getDate();
            const month = date.getMonth() + 1;
            return `${day < 10 ? '0' + day : day}.${month < 10 ? '0' + month : month}`;
        }

        // Загружаем данные при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadFreeDates);
    </script>
</body>
</html>
